<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rohit Bisht | AI Content Creator</title>
    
    <!-- Dependencies -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <!-- Fonts -->
    <link href="https://api.fontshare.com/v2/css?f[]=clash-display@200,400,700,900&f[]=satoshi@300,400,700,900&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --font-heading: 'Clash Display', sans-serif;
            --font-body: 'Helvetica Neue', 'Helvetica', 'Arial', sans-serif;
            --font-mono: 'JetBrains Mono', monospace;
        }
        body {
            background-color: #010204;
            color: #E0E0E0;
            font-family: var(--font-body);
            overflow-x: hidden;
            font-weight: 400; /* Helvetica Regular */
        }
        .font-heading { font-family: var(--font-heading); }
        .font-body { font-family: var(--font-body); }
        .font-mono { font-family: var(--font-mono); }
        
        .stroke-text {
            -webkit-text-stroke: 1.8px rgba(255, 255, 255, 0.2);
            color: transparent;
        }
        @media (max-width: 768px) {
            .stroke-text { -webkit-text-stroke: 1.2px rgba(255, 255, 255, 0.2); }
        }

        @keyframes marquee {
            0% { transform: translateX(0); }
            100% { transform: translateX(-50%); }
        }
        .animate-marquee {
            animation: marquee 60s linear infinite;
        }

        html { scroll-behavior: smooth; }
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: #010204; }
        ::-webkit-scrollbar-thumb { background: #1a1b1e; }
        ::-webkit-scrollbar-thumb:hover { background: #00D2FF; }
        
        .lucide { vertical-align: middle; }

        /* Helvetica Regular Narrative Styling */
        .narrative-text {
            line-height: 1.15;
            letter-spacing: -0.015em;
            text-transform: lowercase;
        }

        .ai-highlight {
            display: inline-block;
            transform: translateY(0.01em);
            text-transform: uppercase;
            font-weight: 900;
        }

        .project-card-transition {
            transition: all 0.7s cubic-bezier(0.23, 1, 0.32, 1);
        }

        /* Nav & UI Labels (Helvetica Regular) */
        .ui-label {
            font-family: var(--font-body);
            font-weight: 400;
            letter-spacing: 0.3em;
            text-transform: uppercase;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const Icon = ({ name, size = 24, className = "" }) => {
            const iconRef = useRef(null);
            useEffect(() => {
                if (iconRef.current) {
                    lucide.createIcons({
                        attrs: {
                            size: size,
                            'stroke-width': 1.5,
                        },
                        nameAttr: 'data-lucide',
                        icons: undefined,
                    });
                }
            }, [name, size]);
            return <i data-lucide={name} className={`${className}`} ref={iconRef}></i>;
        };

        const DecorativeCorner = ({ position = "top-left", color = "white" }) => {
            const positions = {
                "top-left": "top-0 left-0 border-t border-l",
                "top-right": "top-0 right-0 border-t border-r",
                "bottom-left": "bottom-0 left-0 border-b border-l",
                "bottom-right": "bottom-0 right-0 border-b border-r",
            };
            return (
                <div className={`absolute w-3 h-3 ${positions[position]} opacity-10 group-hover:opacity-100 transition-all duration-700`} style={{ borderColor: color }}></div>
            );
        };

        const ProjectCard = ({ video, type = "long" }) => {
            const [isHovered, setIsHovered] = useState(false);
            const isLongForm = type === "long";
            const aspectClass = isLongForm ? "aspect-video" : "aspect-[9/16]";
            const baseUrl = isLongForm ? "https://youtube.com/watch?v=" : "https://youtube.com/shorts/";
            const embedUrl = `https://www.youtube.com/embed/${video.id}?autoplay=1&mute=1&controls=0&loop=1&modestbranding=1&rel=0&playlist=${video.id}&iv_load_policy=3&enablejsapi=1`;

            return (
                <div 
                    onMouseEnter={() => setIsHovered(true)}
                    onMouseLeave={() => setIsHovered(false)}
                    className="relative group flex flex-col"
                >
                    <a 
                        href={`${baseUrl}${video.id}`}
                        target="_blank" 
                        rel="noreferrer"
                        className={`block relative ${aspectClass} overflow-hidden bg-black border border-white/5 shadow-2xl project-card-transition hover:scale-[1.01]`}
                    >
                        <div 
                            className={`absolute inset-0 bg-cover bg-center grayscale transition-all duration-[1.5s] ease-out 
                                ${isHovered ? 'opacity-0 scale-105' : 'opacity-40 group-hover:grayscale-0'}`}
                            style={{ backgroundImage: `url('https://img.youtube.com/vi/${video.id}/${isLongForm ? 'maxresdefault' : 'hqdefault'}.jpg')` }}
                        ></div>

                        {isHovered && (
                            <div className="absolute inset-0 pointer-events-none">
                                <iframe
                                    className="w-full h-full scale-100"
                                    src={embedUrl}
                                    title={video.title}
                                    frameBorder="0"
                                    allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
                                ></iframe>
                            </div>
                        )}

                        <div className={`absolute inset-0 bg-gradient-to-t from-black/80 via-transparent transition-opacity duration-700 ${isHovered ? 'opacity-20' : 'opacity-100'}`}></div>
                        
                        {isLongForm && !isHovered && (
                            <div className="absolute inset-0 flex items-center justify-center transition-all duration-700 scale-90 group-hover:scale-100 z-10 opacity-0 group-hover:opacity-100">
                                <div className="w-16 h-16 rounded-full border border-white/20 bg-black/60 backdrop-blur-xl flex items-center justify-center shadow-2xl">
                                    <Icon name="play" size={24} className="text-[#00D2FF] fill-[#00D2FF] ml-1" />
                                </div>
                            </div>
                        )}
                        <DecorativeCorner position="top-right" color={isLongForm ? "#00D2FF" : "#A668FF"} />
                    </a>

                    <div className="mt-8 flex flex-col gap-3">
                        <h3 className={`text-2xl lg:text-3xl font-heading font-black text-white uppercase italic leading-none transition-all duration-500 ${isHovered ? 'text-[#00D2FF] translate-x-2' : ''}`}>
                            {video.title}
                        </h3>
                        {!isHovered && (
                            <div className="flex items-center gap-4 text-[9px] ui-label text-white/30 tracking-[0.4em]">
                                <div className="w-8 h-px bg-white/20"></div> preview
                            </div>
                        )}
                    </div>
                </div>
            );
        };

        function App() {
            const [scrolled, setScrolled] = useState(false);
            const [mousePos, setMousePos] = useState({ x: 0, y: 0 });
            const [activeSection, setActiveSection] = useState('hero');

            useEffect(() => {
                const handleScroll = () => {
                    setScrolled(window.scrollY > 40);
                    const sections = ['work', 'contact'];
                    for (const section of sections) {
                        const el = document.getElementById(section);
                        if (el && window.scrollY >= el.offsetTop - 450) {
                            setActiveSection(section);
                        }
                    }
                };
                const handleMouseMove = (e) => setMousePos({ x: e.clientX, y: e.clientY });
                window.addEventListener('scroll', handleScroll);
                window.addEventListener('mousemove', handleMouseMove);
                return () => {
                    window.removeEventListener('scroll', handleScroll);
                    window.removeEventListener('mousemove', handleMouseMove);
                };
            }, []);

            const longFormWork = [
                { id: '_WWB_ZmzHHw', title: 'World Of Science' },
                { id: '6mK6AHyHdkQ', title: 'Hybrid Animals' },
            ];

            const shortFormWork = [
                { id: '7qCU8ANCYHg', title: 'Jaipur Comic Con' },
                { id: 'iMFGH2csTD0', title: 'Volunteer Legion' },
                { id: 'Eq2Q-5EUFEE', title: 'Gurugram Comic Con' }
            ];

            return (
                <div className="min-h-screen selection:bg-[#00D2FF] selection:text-black bg-[#010204]">
                    {/* Background System */}
                    <div className="fixed inset-0 pointer-events-none z-0">
                        <div 
                            className="absolute inset-0 opacity-[0.5] transition-opacity duration-1000"
                            style={{
                                background: `radial-gradient(1000px circle at ${mousePos.x}px ${mousePos.y}px, rgba(0, 210, 255, 0.08), transparent 80%)`
                            }}
                        ></div>
                        <div className="absolute inset-0 bg-[url('https://grainy-gradients.vercel.app/noise.svg')] opacity-[0.15] mix-blend-overlay"></div>
                        <div className="absolute inset-0 opacity-[0.04] bg-[linear-gradient(to_right,#ffffff_1px,transparent_1px),linear-gradient(to_bottom,#ffffff_1px,transparent_1px)] bg-[size:80px_80px]"></div>
                    </div>

                    <div className="fixed top-1/2 left-8 -translate-y-1/2 z-40 hidden xl:flex flex-col gap-32 opacity-20 font-mono text-[9px] tracking-[0.8em] [writing-mode:vertical-rl] uppercase text-[#00D2FF]">
                        <span>Lat // 28.6139 N</span>
                        <span>Lng // 77.2090 E</span>
                    </div>

                    {/* Navigation */}
                    <nav className={`fixed w-full top-0 z-50 transition-all duration-1000 ${scrolled ? 'bg-[#010204]/95 backdrop-blur-3xl border-b border-white/5 py-6' : 'bg-transparent py-14'}`}>
                        <div className="max-w-[1400px] mx-auto px-10 flex justify-between items-center relative">
                            <div className="flex items-center gap-6 group cursor-pointer flex-shrink-0 relative z-10">
                                <div className="relative">
                                    <div className="w-12 h-12 border border-white/10 flex items-center justify-center bg-white/[0.01] transition-all duration-500 group-hover:border-[#00D2FF]/60 group-hover:bg-[#00D2FF]/5">
                                        <Icon name="cpu" size={20} className="text-[#00D2FF]" />
                                        <DecorativeCorner position="top-left" color="#00D2FF" />
                                        <DecorativeCorner position="bottom-right" color="#00D2FF" />
                                    </div>
                                </div>
                                <div className="flex flex-col space-y-1.5">
                                    <span className="text-2xl font-heading font-black tracking-tight leading-none uppercase text-white">Rohit Bisht</span>
                                    <span className="text-[10px] ui-label text-[#00D2FF] tracking-[0.2em] opacity-80">AI Content Creator</span>
                                </div>
                            </div>
                            
                            <div className="absolute left-1/2 top-1/2 -translate-x-1/2 -translate-y-1/2 hidden md:flex items-center gap-24">
                                <a href="#work" className={`text-[11px] ui-label tracking-[0.6em] transition-all hover:text-[#00D2FF] ${activeSection === 'work' ? 'text-[#00D2FF]' : 'text-white/30'}`}>WORK</a>
                                <a href="#contact" className={`text-[11px] ui-label tracking-[0.6em] transition-all hover:text-[#00D2FF] ${activeSection === 'contact' ? 'text-[#00D2FF]' : 'text-white/30'}`}>CONTACT</a>
                            </div>

                            <a href="https://linkedin.com/in/rohitusesai" target="_blank" className="group relative px-10 py-3.5 bg-white text-black font-heading font-black text-[12px] uppercase tracking-[0.4em] hover:bg-[#00D2FF] hover:text-white transition-all duration-500 flex-shrink-0 z-10">Connect</a>
                        </div>
                    </nav>

                    {/* Hero Section */}
                    <header className="relative min-h-screen flex flex-col items-center justify-center pt-32 px-6 z-10">
                        <div className="max-w-[1400px] w-full flex flex-col items-center text-center">
                            <div className="space-y-12 w-full flex flex-col items-center relative">
                                <h1 className="text-5xl sm:text-7xl md:text-8xl lg:text-[clamp(5rem,9.5vw,12rem)] font-heading font-black leading-[0.95] tracking-tighter uppercase italic select-none text-white">
                                    AI Content <br />
                                    <span className="stroke-text">Creator.</span>
                                </h1>
                            </div>
                            <div className="mt-20 max-w-6xl mx-auto px-8 relative">
                                <p className="text-3xl md:text-5xl lg:text-7xl narrative-text text-white/70">
                                    blending storytelling and <span className="text-[#00D2FF] font-heading font-black ai-highlight mx-2">AI</span> <br />
                                    to build scalable digital content.
                                </p>
                            </div>
                            <div className="flex flex-wrap justify-center gap-12 pt-24">
                                <a href="#work" className="group bg-[#00D2FF] text-black px-16 py-7 font-heading font-black uppercase text-xs tracking-[0.4em] transition-all duration-500 hover:translate-y-[-8px] hover:shadow-[0_30px_60px_rgba(0,210,255,0.2)] flex items-center gap-6">
                                    <Icon name="play" size={14} className="fill-current" /> view work
                                </a>
                                <a href="mailto:csrohitbisht@gmail.com" className="group border border-white/10 bg-white/[0.02] backdrop-blur-md px-16 py-7 font-heading font-black uppercase text-xs tracking-[0.4em] hover:bg-white/5 transition-all duration-500 flex items-center gap-6 text-white/50">
                                    contact <Icon name="mail" size={14} className="text-[#00D2FF]" />
                                </a>
                            </div>
                        </div>
                        <div className="absolute bottom-12 left-1/2 -translate-x-1/2 flex flex-col items-center gap-8 opacity-30 group cursor-default">
                            {/* Scroll text removed */}
                            <div className="w-px h-32 bg-gradient-to-b from-[#00D2FF] via-white/10 to-transparent"></div>
                        </div>
                    </header>

                    {/* Marquee Skills */}
                    <div className="py-28 border-y border-white/5 bg-white/[0.01] overflow-hidden z-10 relative">
                        <div className="animate-marquee flex gap-32 whitespace-nowrap">
                            {Array(4).fill([
                                "GENERATIVE AI TRAINING", "INSTRUCTIONAL DESIGN", "AI CONTENT CREATION", "TEAM BUILDING", "DIGITAL STORYTELLING"
                            ]).flat().map((skill, i) => (
                                <div key={i} className="flex items-center gap-20">
                                    <span className="text-white/10 font-heading text-8xl font-black uppercase italic tracking-tighter hover:text-[#00D2FF]/20 transition-all duration-700 cursor-default">{skill}</span>
                                    <div className="w-3 h-3 rounded-full bg-[#00D2FF]/30 blur-[1px]"></div>
                                </div>
                            ))}
                        </div>
                    </div>

                    {/* Work Samples Section */}
                    <section id="work" className="py-72 px-10 max-w-[1400px] mx-auto z-10">
                        <div className="mb-64">
                            <h2 className="text-7xl md:text-[11rem] font-heading font-black text-white tracking-tighter uppercase italic leading-[0.9]">Work <br/> <span className="text-[#00D2FF]">Samples.</span></h2>
                            <p className="mt-12 text-4xl lg:text-5xl text-white/30 max-w-2xl narrative-text">a curated selection of experiments and productions across the generative landscape.</p>
                        </div>

                        {/* Widescreen Content */}
                        <div className="mb-80">
                            <div className="flex items-center gap-10 mb-28">
                                <div className="p-4 border border-white/10 bg-white/[0.01]">
                                    <Icon name="film" size={24} className="text-[#00D2FF]" />
                                </div>
                                <div className="flex flex-col gap-1">
                                    <span className="ui-label text-[10px] text-[#00D2FF] tracking-[0.5em]">Category 01</span>
                                    <h3 className="font-heading font-black text-2xl uppercase tracking-[0.2em] text-white">Widescreen Content</h3>
                                </div>
                                <div className="h-px flex-1 bg-white/5"></div>
                            </div>
                            <div className="grid lg:grid-cols-2 gap-24">
                                {longFormWork.map((video, idx) => <ProjectCard key={idx} video={video} type="long" />)}
                            </div>
                        </div>

                        {/* Vertical Media */}
                        <div>
                            <div className="flex items-center gap-10 mb-28">
                                <div className="p-4 border border-white/10 bg-white/[0.01]">
                                    <Icon name="smartphone" size={24} className="text-[#A668FF]" />
                                </div>
                                <div className="flex flex-col gap-1">
                                    <span className="ui-label text-[10px] text-[#A668FF] tracking-[0.5em]">Category 02</span>
                                    <h3 className="font-heading font-black text-2xl uppercase tracking-[0.2em] text-white">Vertical Media</h3>
                                </div>
                                <div className="h-px flex-1 bg-white/5"></div>
                            </div>
                            <div className="grid md:grid-cols-2 lg:grid-cols-3 gap-24">
                                {shortFormWork.map((video, idx) => <ProjectCard key={idx} video={video} type="short" />)}
                            </div>
                        </div>
                    </section>

                    {/* Contact Footer */}
                    <footer id="contact" className="py-80 px-10 border-t border-white/5 bg-black relative z-10 overflow-hidden">
                        <div className="max-w-[1400px] mx-auto flex flex-col items-center text-center">
                            <div className="mb-24 lg:mb-[100px]">
                                <h2 className="text-4xl md:text-5xl lg:text-7xl narrative-text">
                                    <span className="text-[#D1D5DB] font-medium block">scale your content</span>
                                    <span className="text-white font-bold block mt-2">with <span className="ai-highlight text-[#00D2FF]">AI</span>-driven workflows</span>
                                </h2>
                            </div>
                            
                            <div className="grid md:grid-cols-2 gap-20 w-full max-w-6xl">
                                {/* Left Contact Block */}
                                <a href="mailto:csrohitbisht@gmail.com" className="group relative p-20 bg-white/[0.01] border border-white/5 flex justify-between items-center transition-all duration-700 hover:bg-[#00D2FF]/5 hover:border-[#00D2FF]/40">
                                    <div className="text-left space-y-4">
                                        <span className="ui-label text-[10px] text-[#00D2FF] tracking-[0.6em] block opacity-40 group-hover:opacity-100">SEND AN EMAIL</span>
                                        <span className="text-2xl md:text-3xl font-heading font-black text-white uppercase italic tracking-widest">START A CONVERSATION</span>
                                    </div>
                                    <Icon name="arrow-up-right" size={40} className="text-white/10 group-hover:text-[#00D2FF] group-hover:translate-x-3 group-hover:-translate-y-3 transition-all duration-500" />
                                    <DecorativeCorner position="top-left" color="#00D2FF" />
                                </a>
                                {/* Right Contact Block */}
                                <a href="https://linkedin.com/in/rohitusesai" target="_blank" className="group relative p-20 bg-white/[0.01] border border-white/5 flex justify-between items-center transition-all duration-700 hover:bg-[#A668FF]/5 hover:border-[#A668FF]/40">
                                    <div className="text-left space-y-4">
                                        <span className="ui-label text-[10px] text-[#A668FF] tracking-[0.6em] block opacity-40 group-hover:opacity-100">LINKEDIN</span>
                                        <span className="text-2xl md:text-3xl font-heading font-black text-white uppercase italic tracking-widest">LET’S CONNECT</span>
                                    </div>
                                    <Icon name="arrow-up-right" size={40} className="text-white/10 group-hover:text-[#00D2FF] group-hover:translate-x-3 group-hover:-translate-y-3 transition-all duration-500" />
                                    <DecorativeCorner position="top-left" color="#A668FF" />
                                </a>
                            </div>

                            <div className="pt-40 opacity-40 flex flex-col items-center gap-12">
                                <div className="font-mono text-[11px] tracking-[1.4em] font-black text-white uppercase translate-x-[0.7em]">ROHIT BISHT // GEN-AI // NEW DELHI</div>
                                <div className="h-40 w-px bg-gradient-to-b from-[#00D2FF] to-transparent"></div>
                            </div>
                        </div>
                    </footer>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
